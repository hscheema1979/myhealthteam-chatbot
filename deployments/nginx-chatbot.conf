# Nginx configuration for MyHealthTeam Chatbot
# Add this to your main nginx server block or include as a separate config

location /chat {
    proxy_pass http://localhost:8503;
    proxy_http_version 1.1;

    # WebSocket support for Streamlit
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    # Buffering
    proxy_buffering off;
    proxy_cache off;

    # Security headers
    proxy_set_header X-Frame-Options "SAMEORIGIN";
    proxy_set_header X-Content-Type-Options "nosniff";
    proxy_set_header X-XSS-Protection "1; mode=block";
}

# Optional: Direct access for testing (comment out in production)
location /chat-direct {
    proxy_pass http://localhost:8503;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
